<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Messenger</title>
    <style>
        body { font-family: sans-serif; background: #2f3136; color: white; display: flex; justify-content: center; padding: 20px; }
        .card { background: #36393f; padding: 20px; border-radius: 10px; width: 100%; max-width: 400px; }
        select, textarea, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 5px; border: none; box-sizing: border-box; }
        select, textarea { background: #40444b; color: white; }
        button { background: #5865f2; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h3>🤖 Bot Messenger Panel</h3>
        <label>Kirim Ke Channel:</label>
        <select id="channelId">
            <option value="111222333444555">💬 Channel Umum</option>
            <option value="999888777666555">📢 Pengumuman</option>
        </select>

        <textarea id="pesan" placeholder="Ketik pesan..."></textarea>
        <button onclick="kirim()">KIRIM LEWAT BOT</button>
        <p id="status" style="text-align:center;"></p>
    </div>

    <script>
        async function kirim() {
            const status = document.getElementById('status');
            const data = {
                channelId: document.getElementById('channelId').value,
                pesan: document.getElementById('pesan').value
            };

            if (!data.pesan) return alert("Isi pesan!");

            status.innerText = "⏳ Mengirim...";
            const res = await fetch('/api/kirim', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                status.innerText = "✅ Pesan terkirim!";
                document.getElementById('pesan').value = "";
            } else {
                const err = await res.json();
                status.innerText = "❌ Gagal: " + err.error;
            }
        }
    </script>
</body>
</html><!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Admin Panel</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #2f3136; color: white; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: #36393f; padding: 25px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); margin-top: 50px; }
        h2 { text-align: center; color: #5865f2; margin-bottom: 20px; }
        label { display: block; margin-top: 15px; font-size: 14px; color: #b9bbbe; }
        select, textarea, button { width: 100%; padding: 12px; margin-top: 8px; border-radius: 6px; border: none; box-sizing: border-box; font-size: 16px; }
        select, textarea { background: #40444b; color: white; border: 1px solid #202225; outline: none; }
        textarea { height: 120px; resize: none; }
        button { background: #5865f2; color: white; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button:hover { background: #4752c4; }
        button:disabled { background: #4f545c; cursor: not-allowed; }
        #notif { text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🚀 Bot Control</h2>
        
        <label>Pilih Channel:</label>
        <select id="channelKey">
            <option value="WEBHOOK_UMUM">💬 Channel Umum</option>
            <option value="WEBHOOK_MATERI">📚 Channel Materi</option>
            <option value="WEBHOOK_ADMIN">🛠️ Channel Admin</option>
        </select>

        <label>Pesan Anda:</label>
        <textarea id="pesan" placeholder="Tulis sesuatu..."></textarea>
        
        <button id="btn" onclick="kirim()">KIRIM SEKARANG</button>
        <div id="notif"></div>
    </div>

    <script>
        async function kirim() {
            const btn = document.getElementById('btn');
            const notif = document.getElementById('notif');
            const channelKey = document.getElementById('channelKey').value;
            const pesan = document.getElementById('pesan').value;

            if (!pesan) return alert("Ketik pesannya dulu!");

            btn.disabled = true;
            notif.innerText = "⌛ Mengirim...";
            notif.style.color = "white";

            try {
                const res = await fetch('/api/kirim', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pesan, channelKey })
                });

                if (res.ok) {
                    notif.innerText = "✅ Berhasil Terkirim!";
                    notif.style.color = "#43b581";
                    document.getElementById('pesan').value = "";
                } else {
                    const data = await res.json();
                    notif.innerText = "❌ Gagal: " + (data.error || "Cek Vercel");
                    notif.style.color = "#f04747";
                }
            } catch (e) {
                notif.innerText = "❌ Error Jaringan";
                notif.style.color = "#f04747";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
